<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Newborn Welcome Decor</title>
<style>/* SAME CSS AS birthday.html */
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

/* NAVBAR */
.navbar{
  background:#111;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* HERO */
.hero{
  background:linear-gradient(to right,#ff4da6,#ff4da6);
  color:#fff;
  text-align:center;
  padding:60px 20px;
}

.hero-btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:25px;
  font-weight:bold;
}

/* VENDORS */
.vendors{
  padding:50px 20px;
  text-align:center;
  background:#f7f7f7;
}

.vendors h2{
  margin-bottom:30px;
}

.vendor-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.vendor-card{
  position:relative;
  background:#fff;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

.vendor-card:hover{
  transform:translateY(-8px);
}

.vendor-img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
}

.verified{
  position:absolute;
  top:10px;
  left:10px;
  background:#4CAF50;
  color:#fff;
  font-size:12px;
  padding:5px 10px;
  border-radius:20px;
}

.vendor-card h3{
  margin-top:10px;
}

.vendor-card p{
  color:#555;
  margin:5px 0;
}

.vendor-actions{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.call-btn{
  flex:1;
  background:#333;
  color:#fff;
  padding:8px;
  border-radius:20px;
  text-decoration:none;
}

.wa-btn{
  flex:1;
  background:#25D366;
  color:#fff;
  padding:8px;
  border-radius:20px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .vendor-grid{
    grid-template-columns:1fr;
  }
}
/* MOBILE */
@media(max-width:768px){
  .vendor-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

/* FLOATING WHATSAPP */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  font-size:26px;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}
</style></head>
<body>
<div class="navbar">🎈 Newborn Welcome Decor</div>
<section class="hero"><h1>Newborn Welcome Decorators</h1><a href="https://wa.me/91XXXXXXXXXX" class="hero-btn">Register as Vendor</a></section>
<section class="vendors"><div class="vendor-grid">
<div class="vendor-card"><span class="verified">✔ Verified</span><img src="images/vendor2.jpg" class="vendor-img"><h3>Little Star Decor</h3><p>📍 Kudasan</p><div class="vendor-actions"><a href="tel:8888888888" class="call-btn">Call</a><a href="https://wa.me/918888888888" class="wa-btn">WhatsApp</a></div></div>
</div></section>
<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp-float">💬</a>
</body></html>
