<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Decoration Packages</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* HEADER */
.header{
  background:linear-gradient(90deg,#ff4da6,#ff4da6);
  color:#fff;
  padding:50px 20px;
  text-align:center;
}

/* PACKAGES */
.packages{
  padding:40px 15px;
  background:#f7f7f7;
}
.package-grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.package-card{
  display:block;
  text-decoration:none;
  color:#000;
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  transition:.3s;
}
.package-card:hover{
  transform:translateY(-8px);
}

.package-card h3{
  margin-bottom:10px;
}
.package-card p{
  font-size:14px;
  color:#555;
}
.price{
  margin-top:12px;
  font-size:18px;
  font-weight:bold;
  color:#ff4da6;
}

/* MOBILE */
@media(max-width:768px){
  .package-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<section class="header">
  <h1>🎈 Decoration Packages</h1>
  <p>Choose best balloon decoration package</p>
</section>

<section class="packages">
  <div class="package-grid">

    <a href="package-basic.html" class="package-card">
      <h3>Basic </h3>
      <p>🎈 100 Balloons</p>
      <p>🎂 Cake Table</p>
      <div class="price">₹1,999</div>
    </a>

    <a href="package-standard.html" class="package-card">
      <h3>Standard Party</h3>
      <p>🎈 200 Balloons</p>
      <p>🎉 Theme Backdrop</p>
      <div class="price">₹3,999</div>
    </a>

    <a href="package-premium.html" class="package-card">
      <h3>Premium Decor</h3>
      <p>🎈 400 Balloons</p>
      <p>✨ LED + Name</p>
      <div class="price">₹6,999</div>
    </a>

  </div>
</section>

</body>
</html>
