<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* NAVBAR */
.navbar{background:#111;color:#fff;padding:15px;text-align:center;font-size:20px}

/* HERO */
.hero{background:linear-gradient(90deg,#ff4da6,#ff4da6);color:#fff;text-align:center;padding:50px 20px}
.hero a{display:inline-block;margin-top:15px;background:#fff;color:#000;padding:10px 22px;border-radius:25px;text-decoration:none;font-weight:bold}

/* VENDORS */
.vendors{padding:40px 15px;background:#f7f7f7}
.vendor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1100px;margin:auto}

.vendor-card{
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  text-decoration:none;
  color:#000;
  overflow:hidden;
  transition:.3s;
}
.vendor-card:hover{transform:translateY(-8px)}
.vendor-card:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 35px rgba(0,0,0,.15);
}


.vendor-img{width:100%;height:160px;object-fit:cover}

.vendor-body{padding:12px}
.verified{background:#4CAF50;color:#fff;font-size:12px;padding:4px 10px;border-radius:20px;display:inline-block}
.vendor-body h3{margin:8px 0 4px}
.vendor-body p{color:#555;font-size:14px}

/* MOBILE */
@media(max-width:768px){
  .vendor-grid{grid-template-columns:repeat(2,1fr)}
}

/* FLOATING WHATSAPP */
.whatsapp-float{
  position:fixed;bottom:20px;right:20px;
  background:#25D366;color:#fff;
  font-size:26px;padding:15px;border-radius:50%;
  text-decoration:none
}
</style>
</head>
